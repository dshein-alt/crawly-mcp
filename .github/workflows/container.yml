name: Container

on:
  pull_request:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish images for the selected ref if it is a stable vX.Y.Z tag"
        required: false
        default: false
        type: boolean

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      stable_tag: ${{ steps.classify.outputs.stable_tag }}
      should_publish: ${{ steps.classify.outputs.should_publish }}
      version: ${{ steps.classify.outputs.version }}
      major_minor: ${{ steps.classify.outputs.major_minor }}
    steps:
      - id: classify
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish || 'false' }}
        run: |
          stable_tag=false
          should_publish=false
          version=""
          major_minor=""

          if [[ "${REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            stable_tag=true
            version="${REF_NAME#v}"
            major_minor="${version%.*}"
          fi

          if [[ "${stable_tag}" == "true" && "${EVENT_NAME}" == "push" ]]; then
            should_publish=true
          fi

          if [[ "${stable_tag}" == "true" && "${EVENT_NAME}" == "workflow_dispatch" && "${INPUT_PUBLISH}" == "true" ]]; then
            should_publish=true
          fi

          {
            echo "stable_tag=${stable_tag}"
            echo "should_publish=${should_publish}"
            echo "version=${version}"
            echo "major_minor=${major_minor}"
          } >> "${GITHUB_OUTPUT}"

  smoke:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --frozen

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build local image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: linux/amd64
          tags: crawly:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify non-root runtime user
        run: docker run --rm --entrypoint python --user pwuser crawly:test -c "import os; assert os.getuid() != 0"

      - name: Start container
        run: |
          docker run -d --rm \
            --name crawly-test \
            --init \
            --user pwuser \
            --add-host=host.docker.internal:host-gateway \
            -p 8000:8000 \
            crawly:test

      - name: Smoke test MCP over HTTP
        run: |
          for attempt in {1..20}; do
            if .venv/bin/python scripts/http_mcp_smoke.py \
              --url http://127.0.0.1:8000/mcp \
              --private-url http://host.docker.internal:12345; then
              exit 0
            fi
            sleep 2
          done

          docker logs crawly-test
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f crawly-test || true

  publish:
    runs-on: ubuntu-latest
    needs:
      - classify
      - smoke
    if: needs.classify.outputs.should_publish == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/crawly
            ${{ vars.DOCKERHUB_NAMESPACE }}/crawly
          tags: |
            type=raw,value=${{ needs.classify.outputs.version }}
            type=raw,value=${{ needs.classify.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and publish images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify provenance attestation
        run: |
          docker buildx imagetools inspect \
            --format '{{json .Provenance}}' \
            ghcr.io/${{ github.repository_owner }}/crawly:${{ needs.classify.outputs.version }} | grep -v '^null$'

      - name: Verify SBOM attestation
        run: |
          docker buildx imagetools inspect \
            --format '{{json .SBOM}}' \
            ghcr.io/${{ github.repository_owner }}/crawly:${{ needs.classify.outputs.version }} | grep -v '^null$'
